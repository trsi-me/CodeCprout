<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل - CodeSprout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="main-header main-header--primary">
        <div class="header-content header-content--wide">
            <a href="index.html" class="logo-link">
                <img src="static/assets/images/Logo.jpg" alt="CodeSprout" class="logo-img logo-img--full" width="180" height="56">
                <span class="logo-text"><span class="logo-code">Code</span><span class="logo-sprout">Sprout</span></span>
            </a>
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="فتح وإغلاق القائمة" aria-expanded="false" aria-controls="main-nav-drawer">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-backdrop" id="nav-backdrop" hidden></div>
            <nav class="main-nav main-nav--bold" id="main-nav-drawer">
                <a href="index.html"><i class="fa-solid fa-house fa-fw"></i> الرئيسية</a>
                <a href="about.html"><i class="fa-solid fa-circle-info fa-fw"></i> تعريف</a>
                <a href="contact.html"><i class="fa-solid fa-envelope fa-fw"></i> تواصل</a>
                <a href="login.html"><i class="fa-solid fa-right-to-bracket fa-fw"></i> دخول</a>
                <a href="register.html"><i class="fa-solid fa-user-plus fa-fw"></i> تسجيل</a>
            </nav>
        </div>
    </header>
    <main class="main-content main-content--wide">
        <div id="flash-messages"></div>
        <section class="form-section contact-section">
            <div class="form-card contact-card">
                <h1>تواصل معنا</h1>
                <form id="contact-form" class="auth-form">
                    <div class="form-group">
                        <label for="name">الاسم</label>
                        <input type="text" id="name" name="name" required placeholder="أدخل اسمك">
                    </div>
                    <div class="form-group">
                        <label for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label for="message">الرسالة</label>
                        <textarea id="message" name="message" rows="5" placeholder="اكتب رسالتك هنا"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">إرسال</button>
                </form>
            </div>
        </section>
    </main>
    <footer class="main-footer">
        <div class="footer-content">
            <span>CodeSprout 2026 - تعلم البرمجة للأطفال</span>
        </div>
    </footer>
    <script>var API = 'http://127.0.0.1:5000';</script>
    <script src="static/js/main.js"></script>
    <script src="static/js/nav.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit',function(e){
            e.preventDefault();
            var fd=new FormData(this);
            fetch(API+'/api/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                name:fd.get('name'),email:fd.get('email'),message:fd.get('message')
            })}).then(function(r){return r.json();}).then(function(d){
                if(d.success){showFlash(d.message,'success');this.reset();}
                else{showFlash(d.error||'حدث خطأ','error');}
            }.bind(this));
        });
    </script>
</body>
</html>
