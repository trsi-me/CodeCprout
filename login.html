<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - CodeSprout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="main-header main-header--primary">
        <div class="header-content header-content--wide">
            <a href="index.html" class="logo-link">
                <img src="static/assets/images/Logo.jpg" alt="CodeSprout" class="logo-img logo-img--full" width="180" height="56">
                <span class="logo-text"><span class="logo-code">Code</span><span class="logo-sprout">Sprout</span></span>
            </a>
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="فتح وإغلاق القائمة" aria-expanded="false" aria-controls="main-nav-drawer">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-backdrop" id="nav-backdrop" hidden></div>
            <nav class="main-nav main-nav--bold" id="main-nav-drawer">
                <a href="index.html"><i class="fa-solid fa-house fa-fw"></i> الرئيسية</a>
                <a href="about.html"><i class="fa-solid fa-circle-info fa-fw"></i> تعريف</a>
                <a href="contact.html"><i class="fa-solid fa-envelope fa-fw"></i> تواصل</a>
                <a href="login.html"><i class="fa-solid fa-right-to-bracket fa-fw"></i> تسجيل الدخول</a>
                <a href="register.html"><i class="fa-solid fa-user-plus fa-fw"></i> تسجيل</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
        <div id="flash-messages"></div>
        <section class="form-section login-section">
            <div class="form-card login-card">
                <div class="login-logo">
                    <img src="static/assets/images/Logo.jpg" alt="CodeSprout" class="logo-img logo-img--full logo-img--form">
                </div>
                <h1>تسجيل الدخول</h1>
                <p class="form-lead fw-normal">أدخل بياناتك للوصول إلى لوحة التحكم والألعاب التعليمية.</p>
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="username">اسم المستخدم</label>
                        <input type="text" id="username" name="username" required placeholder="أدخل اسم المستخدم" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
                </form>
                <p class="form-footer">لا تملك حساباً؟ <a href="register.html">سجّل الآن</a></p>
            </div>
        </section>
    </main>
    <footer class="main-footer">
        <div class="footer-content">
            <span>CodeSprout — منصة تعليم برمجة</span>
        </div>
    </footer>
    <script>var API = window.location.origin;</script>
    <script src="static/js/main.js"></script>
    <script src="static/js/nav.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit',function(e){
            e.preventDefault();
            var fd=new FormData(this);
            fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({
                username:fd.get('username'),password:fd.get('password')
            })}).then(function(r){return r.json();}).then(function(d){
                if(d.success){window.location.href=d.redirect||'dashboard.html';}
                else{showFlash(d.error,'error');}
            }).catch(function(){showFlash('حدث خطأ','error');});
        });
    </script>
</body>
</html>
